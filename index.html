<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Library</title>
</head>
<body>
    <header>
        <div>
            <h1>Library</h1>
        </div>
            
        <div>
            <button class="add-book">Add Book</button>
        </div>
    </header>
        
    <main>
        <div class="main container">
            <div class="title">
                <h2>Collection</h2>
            </div>

            <dialog>
                <form method="dialog">
                    <div>
                        <h2>Add a new book</h2>
                    </div>
                    <div class="ent">
                        <label for="name" class="bld">Name<span>*</span></label>
                        <input type="text" id="name" name="name" minlength="3" required>
                    </div>
                    <div class="ent">
                        <label for="author" class="bld">Author<span>*</span></label>
                        <input type="text" id="author" name="author" minlength="3" required>
                    </div>
                    <div class="ent">
                        <label for="pages" class="bld">Pages<span>*</span></label>
                        <input type="number" id="pages" name="pages" min="1" required>
                    </div>
                    <div class="status">
                        <div class="bld">Status</div>
                
                        <div>
                            <input type="radio" id="finished" name="status" value="Finished" checked>
                            <label for="finished">Finished</label>
                        </div>
                        <div>
                            <input type="radio" for="reading" name="status" value="Reading...">
                            <label for="reading">Reading</label>
                        </div>
                    </div>

                    <div class="dialog_btns">
                        <button value="submit" class="submit">Submit</button>
                        <button value="cancel" formmethod="dialog" class="cancel    ">Cancel</button>
                    </div>
                </form>
            </dialog>
        </div>

        <div class="output">
            
        </div>
    </main>

    <footer>
        <p>@ 2025 Library: All rights reserved.</p>
    </footer>
</body>
</html>
