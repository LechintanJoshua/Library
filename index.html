<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Library</title>
</head>
<body>
    <header>
        <div class="header container">
            <div>
                <h1>Library</h1>
            </div>
            
            <div>
                <button>Add Book</button>
            </div>
        </div>
    </header>
        
    <main>
        <div class="main container">
            <div class="title">
                <h2>Collection</h2>
            </div>

            <form action="get">
                <div>
                    <h2>Add a new book</h2>
                </div>

                <div>
                    <label for="name">Name<span>*</span></label>
                    <input type="text" id="name" name="name" minlength="3" required>
                </div>

                <div>
                    <label for="author">Author<span>*</span></label>
                    <input type="text" id="author" name="author" minlength="3" required>
                </div>

                <div>
                    <label for="pages">Pages<span>*</span></label>
                    <input type="number" id="pages" name="pages" min="1" required>
                </div>

                <div class="status">                    
                    <fieldset>
                        <legend>Status</legend>

                        <div>
                            <input type="radio" for="reading" name="reading" checked>
                            <label for="reading">Reading</label>
                        </div>
                        
                        <div>
                            <input type="radio" id="finished" name="finished">
                            <label for="finished">Finished</label>
                        </div>
                    </fieldset>
                </div>

                <div>
                    <button type="submit">Submit</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer container">
            <p>@ 2025 Library: All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
