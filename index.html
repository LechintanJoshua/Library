<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Library</title>
</head>
<body>
    <header>
        <div>
            <h1>Library</h1>
        </div>
            
        <div>
            <button class="add-book">Add Book</button>
        </div>
    </header>
        
    <main>
        <div class="main container">
            <div class="title">
                <h2>Collection</h2>
            </div>

            <dialog>
                <form method="dialog">
                    <div>
                        <h2>Add a new book</h2>
                    </div>
                    <div>
                        <label for="name">Name<span>*</span></label>
                        <input type="text" id="name" name="name" minlength="3" required>
                    </div>
                    <div>
                        <label for="author">Author<span>*</span></label>
                        <input type="text" id="author" name="author" minlength="3" required>
                    </div>
                    <div>
                        <label for="pages">Pages<span>*</span></label>
                        <input type="number" id="pages" name="pages" min="1" required>
                    </div>
                    <div class="status">
                        <fieldset>
                            <legend>Status</legend>
                
                            <div>
                                <input type="radio" id="finished" name="status" value="finished" checked>
                                <label for="finished">Finished</label>
                            </div>
                            <div>
                                <input type="radio" for="reading" name="status" value="reading">
                                <label for="reading">Reading</label>
                            </div>
                        </fieldset>
                    </div>
                    <div>
                        <button value="submit" class="submit">Submit</button>
                        <button value="cancel" formmethod="dialog">Cancel</button>
                    </div>
                </form>
            </dialog>
        </div>
    </main>

    <footer>
        <p>@ 2025 Library: All rights reserved.</p>
    </footer>
</body>
</html>
